owner: SynVisions
repo: homelab-status
user-agent: SynVisions

status-website:
  # cname is added in Task 03 — leave commented for now so the site
  # builds at the default github.io URL until DNS is wired.
  # cname: status.syntheticvisions.net
  logoUrl: ""
  name: "Homelab Status"
  introTitle: "Status of homelab-hosted external services."
  introMessage: |
    This page reports the current and historical reachability of the
    externally-facing services hosted on the operator's homelab.
    For an outage you don't see called out below, the operator may not
    know yet — please reach out.

sites:
  - name: Plex
    url: https://plex.syntheticvisions.net/identity
    expectedStatusCodes: [200]
    __dangerous__body_down_if_text_missing: "machineIdentifier"
  - name: Overseerr
    url: https://overseer.syntheticvisions.net/api/v1/status
    expectedStatusCodes: [200]
    headers:
      - "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
