owner: SynVisions
repo: homelab-status
user-agent: SynVisions

status-website:
  cname: status.syntheticvisions.net
  logoUrl: "https://cdn.jsdelivr.net/gh/SynVisions/homelab-status@d582c45/assets/logo.svg"
  faviconSvg: "https://cdn.jsdelivr.net/gh/SynVisions/homelab-status@d582c45/assets/favicon.svg"
  name: "Homelab Status"
  introTitle: "Status of homelab-hosted external services."
  introMessage: |
    This page reports the current and historical reachability of the
    externally-facing services hosted on the operator's homelab.
    For an outage you don't see called out below, the operator may not
    know yet — please reach out.
  themeUrl: "https://cdn.jsdelivr.net/gh/SynVisions/homelab-status@d582c45/assets/theme.css"
  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap">

sites:
  - name: Plex
    url: https://plex.syntheticvisions.net/identity
    expectedStatusCodes: [200]
    __dangerous__body_down_if_text_missing: "machineIdentifier"
  - name: Overseerr
    url: https://overseer.syntheticvisions.net/api/v1/status
    expectedStatusCodes: [200]
    headers:
      - "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
